<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たこさし（令和最新版）V8</title>
    <style>
        :root { --bg-color: #f4a460; --iron-color: #333; }
        * { touch-action: manipulation; -webkit-user-select: none; }
        body { text-align: center; background: var(--bg-color); font-family: sans-serif; margin: 0; padding: 0; }
        #ui { padding: 10px; color: #fff; text-shadow: 2px 2px 0 #000; }
        .stats { font-size: 24px; font-weight: bold; }
        #combo-container { font-size: 32px; color: #ffeb3b; height: 40px; margin-top: 5px; font-style: italic; transition: 0.1s; }

        .grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
            background: var(--iron-color); padding: 15px; border-radius: 15px; 
            width: 90vw; max-width: 450px; margin: 0 auto; box-shadow: 0 8px 0 #222;
        }
        .hole { aspect-ratio: 1/1; background: #222; border-radius: 50%; cursor: pointer; position: relative; }
        .tako { width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; box-sizing: border-box; pointer-events: none; }
        .step1 { background: #ffeaa7; transform: scale(0.6); }
        .step2 { background: #fab1a0; transform: scale(0.8); }
        .done  { background: #e67e22; transform: scale(1.0); box-shadow: inset 0 0 0 4px #fff; }
        .done::after { content: "完成!"; font-size: 14px; }
        .gold   { background: #f1c40f !important; box-shadow: inset 0 0 0 5px #fff, 0 0 10px #fff !important; }
        .poison { background: #8e44ad !important; box-shadow: inset 0 0 0 5px #222 !important; }
        .burnt  { background: #2d3436 !important; box-shadow: none !important; }
        .burnt::after { content: "焦げ"; font-size: 14px; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; color: white; }
        #start-btn, .share-btn { padding: 15px 30px; font-size: 20px; font-weight: bold; color: #fff; background: #e67e22; border: none; border-radius: 50px; cursor: pointer; margin: 10px; box-shadow: 0 4px 0 #d35400; }
        .share-btn { background: #000; border: 1px solid #fff; display: none; }
        #countdown-text { font-size: 100px; display: none; font-weight: bold; }
        #result-text { font-size: 24px; margin-bottom: 20px; text-align: center; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stats">⏱ <span id="time">60</span>s | 得点: <span id="score">0</span></div>
        <div id="combo-container"><span id="combo">0</span> COMBO!!</div>
    </div>

    <div class="grid" id="grid"></div>

    <div id="overlay">
        <div id="result-text"></div>
        <button id="start-btn" onclick="preStart()">ゲーム開始！</button>
        <button id="share-btn" class="share-btn" onclick="shareX()">Xに投稿する</button>
        <div id="countdown-text"></div>
    </div>

    <script>
        let score = 0, timeLeft = 60, combo = 0, isPlaying = false;
        const maxSimultaneousLimit = 10;

        for (let i = 0; i < 20; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';
            hole.onclick = (e) => { e.preventDefault(); clickTako(hole); };
            document.getElementById('grid').appendChild(hole);
        }

        function preStart() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('share-btn').style.display = 'none';
            document.getElementById('result-text').innerText = '';
            const countEl = document.getElementById('countdown-text');
            countEl.innerText = "3";
            countEl.style.display = 'block';
            let count = 3;
            const timer = setInterval(() => {
                if (count > 1) { count--; countEl.innerText = count; }
                else if (count === 1) { count--; countEl.innerText = "GO!"; }
                else { clearInterval(timer); countEl.style.display = 'none'; document.getElementById('overlay').style.display = 'none'; startGame(); }
            }, 800);
        }

        function startGame() {
            isPlaying = true; score = 0; timeLeft = 60; combo = 0; updateUI();
            const gameLoop = setInterval(() => {
                if (!isPlaying) { clearInterval(gameLoop); return; }
                timeLeft--;
                updateUI();
                if (timeLeft <= 0) endGame();
                else tick();
            }, 1000);
        }

        function tick() {
            const currentCount = document.querySelectorAll('.tako-active').length;
            if (currentCount >= maxSimultaneousLimit) return;
            const targetCount = Math.floor(Math.random() * 9) + 2;
            if (currentCount < targetCount) {
                spawnTako(targetCount - currentCount);
            }
        }

        function spawnTako(num) {
            const emptyHoles = Array.from(document.querySelectorAll('.hole:not(.tako-active)'));
            const actualSpawn = Math.min(num, emptyHoles.length);

            for (let i = 0; i < actualSpawn; i++) {
                const target = emptyHoles.splice(Math.floor(Math.random() * emptyHoles.length), 1)[0];
                target.classList.add('tako-active');

                let type = Math.random() < 0.08 ? 'gold' : (Math.random() < 0.15 ? 'poison' : 'normal');
                const takoImg = document.createElement('div');
                takoImg.className = 'tako step1';
                target.appendChild(takoImg);

                setTimeout(() => { if(takoImg.parentNode) takoImg.className = `tako step2 ${type==='gold'?'gold':''} ${type==='poison'?'poison':''}`; }, 1000);
                setTimeout(() => { 
                    if(takoImg.parentNode) {
                        takoImg.classList.replace('step2', 'done');
                        takoImg.dataset.status = 'ready';
                        takoImg.dataset.type = type;
                    }
                }, 2000);
                
                // 完成から焦げるまで5秒（計7秒）
                setTimeout(() => {
                    if (takoImg.parentNode && takoImg.dataset.status === 'ready') {
                        takoImg.classList.replace('done', 'burnt');
                        takoImg.dataset.status = 'burnt';
                        
                        // 【重要修正】毒以外が焦げたときだけコンボを切る
                        if (type !== 'poison') {
                            combo = 0;
                            updateUI();
                        }

                        setTimeout(() => { 
                            if(takoImg.parentNode) { 
                                target.innerHTML = ''; 
                                target.classList.remove('tako-active'); 
                            } 
                        }, 1000);
                    }
                }, 7000);
            }
        }

        function clickTako(hole) {
            const tako = hole.querySelector('.tako');
            if (!tako || tako.dataset.status !== 'ready') return;
            const type = tako.dataset.type;
            
            if (type === 'poison') { 
                score -= 50; 
                combo = 0; // 毒を刺したらコンボ終了
            } else { 
                combo++; 
                score += (type === 'gold' ? 100 : 10) + Math.floor(combo / 5) * 5; 
            }
            updateUI();
            hole.innerHTML = ''; hole.classList.remove('tako-active');
        }

        function updateUI() {
            document.getElementById('time').innerText = timeLeft;
            document.getElementById('score').innerText = score;
            document.getElementById('combo').innerText = combo;
            document.getElementById('combo-container').style.transform = combo > 0 ? "scale(1.1)" : "scale(1)";
        }

        function endGame() {
            isPlaying = false;
            let rank = score > 2000 ? "神の職人" : (score > 1200 ? "熟練の店長" : (score > 600 ? "一人前" : "修行中"));
            document.getElementById('result-text').innerText = `【リザルト】\nスコア: ${score}点\nランク: ${rank}`;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('share-btn').style.display = 'block';
            document.querySelectorAll('.hole').forEach(h => { h.innerHTML = ''; h.classList.remove('tako-active'); });
        }

        function shareX() {
            const text = encodeURIComponent(`🐙たこさし（令和最新版）で${score}点獲得！\nランク：${document.getElementById('result-text').innerText.split('ランク: ')[1]}\n#たこさし令和最新版`);
            window.open(`https://twitter.com/intent/tweet?text=${text}`);
        }
    </script>
</body>
</html>
