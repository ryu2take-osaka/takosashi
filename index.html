<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たこさし（令和最新版）</title>
    <style>
        :root { 
            --bg-color: #e67e22;
            --iron-color: #2c3e50;
            --source-normal: #6e2c00; 
            --source-gold: #f1c40f; 
            --source-poison: #8e44ad;
            --mayo: #f1c40f;
            --aonori: #27ae60;
        }
        * { touch-action: manipulation; -webkit-user-select: none; }
        body { 
            text-align: center; 
            background-color: var(--bg-color);
            background-image: repeating-linear-gradient(45deg, #d35400 0, #d35400 1px, transparent 0, transparent 50%);
            background-size: 10px 10px;
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif; 
            margin: 0; padding: 0; 
        }
        
        #ui { padding: 15px; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.3); }
        .stats { font-size: 26px; font-weight: bold; }
        #combo-container { font-size: 36px; color: #ffeb3b; height: 45px; margin-top: 5px; font-style: italic; font-weight: bold; text-shadow: 0 0 10px #fff, 2px 2px 0 #000; }

        .grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; 
            background: var(--iron-color); 
            padding: 20px; border-radius: 20px; 
            width: 90vw; max-width: 480px; margin: 20px auto; 
            box-shadow: inset 0 0 20px #000, 0 10px 0 #1a252f;
        }
        .hole { 
            aspect-ratio: 1/1; background: #1a1a1a; border-radius: 50%; cursor: pointer; position: relative; 
            box-shadow: inset 0 5px 10px #000; overflow: hidden;
        }

        .tako { 
            width: 100%; height: 100%; border-radius: 50%; position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center; pointer-events: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .step1 { background: radial-gradient(circle at 30% 30%, #fffde7 0%, #ffeaa7 100%); transform: scale(0.6) translateY(10px); opacity: 0.8; }
        .step2 { background: radial-gradient(circle at 30% 30%, #ffeaa7 0%, #f39c12 100%); transform: scale(0.85) translateY(5px); }
        
        /* 通常たこ焼き */
        .done { 
            transform: scale(1.0) translateY(0); 
            background: 
                radial-gradient(circle at 70% 70%, var(--aonori) 2px, transparent 3px),
                linear-gradient(135deg, transparent 40%, var(--mayo) 42%, var(--mayo) 47%, transparent 49%),
                radial-gradient(circle at 50% 40%, var(--source-normal) 0%, var(--source-normal) 60%, transparent 70%),
                radial-gradient(circle at 30% 30%, #f39c12 0%, #d35400 100%);
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.5);
        }
        
        /* 黄金ソースたこ焼き */
        .gold { 
            background: 
                radial-gradient(circle at 20% 20%, #fff 0%, transparent 10%), /* 黄金の輝き */
                radial-gradient(circle at 80% 30%, #fff 0%, transparent 10%),
                radial-gradient(circle at 50% 40%, var(--source-gold) 0%, #d4ac0d 60%, transparent 70%), /* 黄金ソース */
                radial-gradient(circle at 30% 30%, #f1c40f 0%, #9a7d0a 100%); /* ベース */
            box-shadow: 0 0 20px rgba(255,255,255,0.6), inset 0 -5px 10px rgba(0,0,0,0.3) !important;
        }

        /* 毒ソースたこ焼き */
        .poison { 
            background: 
                radial-gradient(circle at 70% 20%, #2ecc71 2px, transparent 3px), /* 怪しい緑の粒 */
                radial-gradient(circle at 30% 60%, #2ecc71 1.5px, transparent 2px),
                radial-gradient(circle at 50% 40%, var(--source-poison) 0%, #4a235a 65%, transparent 75%), /* 毒ソース */
                radial-gradient(circle at 30% 30%, #8e44ad 0%, #2c3e50 100%); /* ベース */
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.7) !important;
        }

        .burnt { background: radial-gradient(circle at 30% 30%, #444 0%, #000 100%) !important; }

        .tako::after {
            font-size: 16px; font-weight: 900; color: #fff;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 0 2px 5px rgba(0,0,0,0.5);
        }
        .done::after { content: "完成!"; }
        .gold::after { content: "黄金!"; color: #fff; }
        .poison::after { content: "毒!!"; color: #adff2f; }
        .burnt::after { content: "炭"; font-size: 20px; color: #555; text-shadow: none; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; color: white; backdrop-filter: blur(5px); }
        #start-btn, .share-btn { padding: 18px 40px; font-size: 22px; font-weight: bold; color: #fff; background: #c0392b; border: none; border-radius: 50px; cursor: pointer; margin: 15px; box-shadow: 0 5px 0 #922b21; }
        .share-btn { background: #000; border: 2px solid #fff;
